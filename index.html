<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="indextodolistcss.css">
</head>
<body>
<div class="container">
    <div class="todo-app">
        <div class="header">
            <h2>To-Do List</h2>
            <button id="dark-mode-toggle" class="dark-mode-btn">🌙</button>
        </div>
        <div class="row">
            <input type="text" id="input-box" placeholder="Add task">
            <button onclick="addTask()">Add</button>
        </div>  
        <ul id="list-container">
           <!-- <li class="checked">Task 1</li>
            <li>Task 2</li>
            <li>Task 3</li> -->
        </ul>
    </div>
</div>
<script src="indextodolistjs.js"></script>
</body>
</html>
